StylesPath = ~/.local/share/vale/styles

MinAlertLevel = suggestion

Packages = RedHat, proselint, write-good, alex, Joblint

[*.org]
BlockIgnores = (?si) [#][+]BEGIN_(SRC|EXAMPLE|QUOTE).+[#][+]END_\1.*$

[*]
BasedOnStyles = Vale, RedHat, proselint, write-good, alex, Joblint

Vale.Spelling = NO

Joblint.DevEnv = NO

RedHat.Spelling = NO
RedHat.GitLinks = NO  # Do not include a link to https://git*.com/ unless it is explicitly approved
RedHat.Headings = NO  # Use sentence-style capitalization in '...'
RedHat.Contractions = NO  # Avoid contractions. Use ''it is'' rather than 'it's.'
RedHat.UserReplacedValues = NO  # Separate words by underscores in user-replaced values

write-good.E-Prime = NO  # Try to avoid using '...'; Is, Been, Was, etc

alex.Ablist = NO  # When referring to a person, consider using 'has a disability', 'person with a disability', or 'people with disabilities' instead of 'special'.
